version: "3.8"

services:
  physiooffice-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: patient-hub-frontend-physiooffice:dev
    container_name: physiooffice-dev
    ports:
      - "8082:8081"
    restart: unless-stopped
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
      - PB_URL=https://pocketbase-dev.physiooffice.com
